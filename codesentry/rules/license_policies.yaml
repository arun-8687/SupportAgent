policies:
  strict:
    description: "Strict policy for commercial/proprietary projects"
    allowed:
      - MIT
      - Apache-2.0
      - BSD-2-Clause
      - BSD-3-Clause
      - ISC
      - CC0-1.0
      - Unlicense
      - WTFPL
      - 0BSD
    warning:
      - LGPL-2.1-only
      - LGPL-2.1-or-later
      - LGPL-3.0-only
      - LGPL-3.0-or-later
      - MPL-2.0
      - EPL-2.0
      - CDDL-1.0
    denied:
      - GPL-2.0-only
      - GPL-2.0-or-later
      - GPL-3.0-only
      - GPL-3.0-or-later
      - AGPL-3.0-only
      - AGPL-3.0-or-later
      - SSPL-1.0
      - EUPL-1.2

  moderate:
    description: "Moderate policy allowing weak copyleft"
    allowed:
      - MIT
      - Apache-2.0
      - BSD-2-Clause
      - BSD-3-Clause
      - ISC
      - CC0-1.0
      - Unlicense
      - WTFPL
      - 0BSD
      - LGPL-2.1-only
      - LGPL-2.1-or-later
      - LGPL-3.0-only
      - LGPL-3.0-or-later
      - MPL-2.0
      - EPL-2.0
    warning:
      - GPL-2.0-only
      - GPL-2.0-or-later
      - GPL-3.0-only
      - GPL-3.0-or-later
      - CDDL-1.0
      - EUPL-1.2
    denied:
      - AGPL-3.0-only
      - AGPL-3.0-or-later
      - SSPL-1.0

  permissive:
    description: "Permissive policy for open-source projects"
    allowed:
      - MIT
      - Apache-2.0
      - BSD-2-Clause
      - BSD-3-Clause
      - ISC
      - CC0-1.0
      - Unlicense
      - WTFPL
      - 0BSD
      - LGPL-2.1-only
      - LGPL-2.1-or-later
      - LGPL-3.0-only
      - LGPL-3.0-or-later
      - MPL-2.0
      - EPL-2.0
      - GPL-2.0-only
      - GPL-2.0-or-later
      - GPL-3.0-only
      - GPL-3.0-or-later
      - EUPL-1.2
    warning:
      - AGPL-3.0-only
      - AGPL-3.0-or-later
    denied:
      - SSPL-1.0
