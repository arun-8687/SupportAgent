rules:
  - id: generic-hardcoded-credential
    pattern-regex: '(?i)(password|passwd|pwd|secret|token|api[_-]?key)\s*[=:]\s*["''][A-Za-z0-9!@#$%^&*()_+\-=\[\]{};:,.<>?/\\|`~]{8,}["'']'
    message: "Potential hardcoded credential detected."
    languages: [generic]
    severity: WARNING
    metadata:
      cwe: ["CWE-798"]

  - id: generic-private-key
    pattern-regex: '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
    message: "Private key detected in source code."
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: ["CWE-321"]

  - id: generic-todo-security
    pattern-regex: '(?i)(TODO|FIXME|HACK|XXX).*(security|vulnerable|insecure|auth|password|secret|credential|inject|xss|csrf|sqli)'
    message: "Security-related TODO/FIXME found."
    languages: [generic]
    severity: INFO
    metadata:
      cwe: ["CWE-0"]
