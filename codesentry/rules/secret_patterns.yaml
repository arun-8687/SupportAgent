patterns:
  - name: AWS Access Key ID
    regex: '(?<![A-Z0-9])(AKIA[0-9A-Z]{16})(?![A-Z0-9])'
    severity: CRITICAL
    cwe: CWE-798
    description: "AWS Access Key ID detected"

  - name: AWS Secret Access Key
    regex: '(?i)(aws_secret_access_key|aws_secret)\s*[=:]\s*["'']?([A-Za-z0-9/+=]{40})["'']?'
    severity: CRITICAL
    cwe: CWE-798
    description: "AWS Secret Access Key detected"

  - name: GitHub Personal Access Token
    regex: '(ghp_[A-Za-z0-9]{36}|gho_[A-Za-z0-9]{36}|ghs_[A-Za-z0-9]{36}|ghr_[A-Za-z0-9]{36})'
    severity: CRITICAL
    cwe: CWE-798
    description: "GitHub token detected"

  - name: GitHub Fine-grained PAT
    regex: 'github_pat_[A-Za-z0-9_]{82}'
    severity: CRITICAL
    cwe: CWE-798
    description: "GitHub fine-grained personal access token detected"

  - name: GitLab Personal Access Token
    regex: 'glpat-[A-Za-z0-9\-]{20,}'
    severity: CRITICAL
    cwe: CWE-798
    description: "GitLab personal access token detected"

  - name: Slack Token
    regex: 'xox[bpsa]-[A-Za-z0-9\-]{10,}'
    severity: HIGH
    cwe: CWE-798
    description: "Slack token detected"

  - name: Stripe API Key
    regex: '(sk_live_[A-Za-z0-9]{24,}|rk_live_[A-Za-z0-9]{24,})'
    severity: CRITICAL
    cwe: CWE-798
    description: "Stripe live API key detected"

  - name: Azure Storage Account Key
    regex: '(?i)(AccountKey|account_key)\s*[=:]\s*["'']?([A-Za-z0-9+/]{86}==)["'']?'
    severity: CRITICAL
    cwe: CWE-798
    description: "Azure Storage account key detected"

  - name: Azure Service Bus Connection String
    regex: 'Endpoint=sb://[^;]+;SharedAccessKeyName=[^;]+;SharedAccessKey=[A-Za-z0-9+/=]+'
    severity: CRITICAL
    cwe: CWE-798
    description: "Azure Service Bus connection string detected"

  - name: Generic API Key Assignment
    regex: '(?i)(api[_-]?key|apikey|api[_-]?secret)\s*[=:]\s*["'']([A-Za-z0-9_\-]{20,})["'']'
    severity: HIGH
    cwe: CWE-798
    description: "Generic API key detected"

  - name: Private Key
    regex: '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
    severity: CRITICAL
    cwe: CWE-321
    description: "Private key file detected"

  - name: JSON Web Token
    regex: 'eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'
    severity: MEDIUM
    cwe: CWE-798
    description: "JWT token detected (may be hardcoded)"

  - name: Connection String with Password
    regex: '(?i)(password|pwd)\s*=\s*["'']?[^\s"'';]{8,}["'']?'
    severity: HIGH
    cwe: CWE-798
    description: "Connection string with embedded password detected"

  - name: SendGrid API Key
    regex: 'SG\.[A-Za-z0-9_-]{22}\.[A-Za-z0-9_-]{43}'
    severity: CRITICAL
    cwe: CWE-798
    description: "SendGrid API key detected"

  - name: Twilio Auth Token
    regex: '(?i)twilio[_-]?auth[_-]?token\s*[=:]\s*["'']?([a-f0-9]{32})["'']?'
    severity: CRITICAL
    cwe: CWE-798
    description: "Twilio auth token detected"

  - name: Google API Key
    regex: 'AIza[0-9A-Za-z_-]{35}'
    severity: HIGH
    cwe: CWE-798
    description: "Google API key detected"

  - name: Heroku API Key
    regex: '(?i)heroku[_-]?api[_-]?key\s*[=:]\s*["'']?([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})["'']?'
    severity: HIGH
    cwe: CWE-798
    description: "Heroku API key detected"

  - name: Database URL with Credentials
    regex: '(?i)(postgres|mysql|mongodb|redis)://[^:]+:[^@]+@[^/]+'
    severity: CRITICAL
    cwe: CWE-798
    description: "Database URL with embedded credentials detected"

  - name: .env File Secrets
    regex: '(?i)^(DB_PASSWORD|SECRET_KEY|API_SECRET|PRIVATE_KEY|AUTH_TOKEN)\s*=\s*.{8,}'
    severity: HIGH
    cwe: CWE-798
    description: "Secret detected in environment variable"
