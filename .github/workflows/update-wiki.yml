name: Update Wiki on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  update-wiki:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and authenticate Copilot CLI
        env:
          COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          # Install the Copilot CLI (package is @githubnext/github-copilot-cli)
          npm install -g @githubnext/github-copilot-cli 2>/dev/null || \
          npm install -g @githubnext/copilot-cli 2>/dev/null || true
          # Authenticate with the PAT
          if command -v copilot &>/dev/null; then
            echo "$COPILOT_TOKEN" | copilot auth login --with-token 2>/dev/null || true
            echo "Copilot CLI authenticated"
          else
            echo "Copilot CLI not available, will use GitHub Models API fallback"
          fi

      - name: Checkout wiki
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki
          cd wiki && git config user.name "github-actions[bot]" && git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          gh pr diff "$PR_NUMBER" --repo "${{ github.repository }}" > /tmp/pr_diff.txt
          gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json files --jq '.files[].path' > /tmp/changed_files.txt
          echo "## Changed files:"
          cat /tmp/changed_files.txt
          echo "---"
          echo "Diff size: $(wc -c < /tmp/pr_diff.txt) bytes"

      - name: Map files to wiki pages
        id: map
        run: |
          bash scripts/map-files-to-wiki.sh /tmp/changed_files.txt wiki > /tmp/mapping.json
          echo "## File-to-wiki mapping:"
          cat /tmp/mapping.json

      - name: Update wiki pages with Copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          bash scripts/update-wiki-pages.sh /tmp/pr_diff.txt /tmp/mapping.json wiki "${{ github.event.pull_request.title }}" "${{ github.event.pull_request.number }}"

      - name: Push wiki changes
        run: |
          cd wiki
          if git diff --quiet && git diff --cached --quiet; then
            echo "No wiki changes to push."
          else
            git add -A
            git commit -m "Auto-update wiki from PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
            git push
            echo "Wiki updated successfully."
          fi
